name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 📦 Install Mise
        run: |
          curl https://mise.run | sh
          mise install

      - name: lint
        run: mise lint
